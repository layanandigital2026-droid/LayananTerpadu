<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form Antrian Kunjungan</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f0ebf8;
  margin: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 15px;
}

h2 {
  margin-top: 0;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-bottom: 1px solid #ccc;
  font-size: 14px;
}

button {
  background: #673ab7;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 5px;
  width: 100%;
  font-size: 16px;
}

button:hover {
  background: #5a2ea6;
}

.result {
  text-align: center;
  font-size: 18px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>Form Kunjungan Lapas</h2>
  </div>

  <div class="card">
    <label>Nama Lengkap *</label>
    <input id="nama">
  </div>

  <div class="card">
    <label>Nomor KTP/NIK *</label>
    <input id="nik">
  </div>

  <div class="card">
    <label>Nomor WhatsApp *</label>
    <input id="wa">
  </div>

  <div class="card">
    <label>Nama Warga Binaan *</label>
    <input id="warga">
  </div>

  <div class="card">
    <label>Alamat *</label>
    <textarea id="alamat"></textarea>
  </div>

  <div class="card">
    <label>Tanggal Kunjungan *</label>
    <input type="date" id="tanggal">
  </div>

  <div class="card">
    <label>Hubungan dengan Warga Binaan *</label>
    <input id="hubungan">
  </div>

  <div class="card">
    <label>Apakah membawa barang? *</label>
    <select id="barang">
      <option>Ya</option>
      <option>Tidak</option>
    </select>
  </div>

  <div class="card">
    <label>Jika ya, sebutkan</label>
    <select id="jenis_barang">
      <option>Makanan</option>
      <option>Pakaian</option>
      <option>Lainnya</option>
    </select>
  </div>

  <div class="card">
    <label>
      <input type="checkbox" id="setuju">
      Saya bersedia mematuhi seluruh peraturan
    </label>
  </div>

  <!--button onclick="kirim()">Kirim</button--!>
  <button id="btnKirim" onclick="kirim()">Kirim</button>

  <div class="result" id="hasil"></div>

</div>

<script>
let isSubmitting = false;

function kirim() {

  // ⛔ cegah klik 2x
  if (isSubmitting) return;

  // ✅ validasi input
  if (
    !nama.value || !nik.value || !wa.value || 
    !warga.value || !alamat.value || !tanggal.value || !hubungan.value
  ) {
    alert("Harap isi semua data wajib!");
    return;
  }

  if (!setuju.checked) {
    alert("Anda harus menyetujui peraturan!");
    return;
  }

  isSubmitting = true;

  // ⛔ Disable tombol + loading
  btnKirim.disabled = true;
  btnKirim.innerText = "Mengirim...";

  fetch("https://script.google.com/macros/s/AKfycbwWlVGXNImM0C0dFfig_kf-zGPnf2nf6CP9AKZ97SPVJT8UrbXFhTGKuhTePobxmsn0qA/exec", {
    method: "POST",
    body: JSON.stringify({
      nama: nama.value,
      nik: nik.value,
      wa: wa.value,
      warga: warga.value,
      alamat: alamat.value,
      tanggal: tanggal.value,
      hubungan: hubungan.value,
      barang: barang.value,
      jenis_barang: jenis_barang.value
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "full") {
      hasil.innerHTML = "❌ Kuota penuh";
      hasil.style.color = "red";

    } else if (data.status === "ok") {
      hasil.innerHTML =
        "✅ Nomor Antrian Anda: <b>" + data.nomor + "</b><br><br>" +
        "<button id='btnBack'>Kembali ke Beranda</button>";

      hasil.style.color = "green";

      // ✅ tombol kembali manual (lebih aman dari onclick inline)
      document.getElementById("btnBack").onclick = function() {
        window.location.href = "https://sites.google.com/view/layanan-terpadu-lakusim/halaman-muka";
      };

      // ⏳ redirect otomatis (opsional)
      setTimeout(() => {
        window.location.href = "https://sites.google.com/view/layanan-terpadu-lakusim/halaman-muka";
      }, 5000);
    }

    // ✅ aktifkan kembali tombol
    isSubmitting = false;
    btnKirim.disabled = false;
    btnKirim.innerText = "Kirim";

  })
  .catch(() => {
    hasil.innerHTML = "❌ Gagal kirim";
    hasil.style.color = "red";

    isSubmitting = false;
    btnKirim.disabled = false;
    btnKirim.innerText = "Kirim";
  });
}
</script>

</body>
</html>
