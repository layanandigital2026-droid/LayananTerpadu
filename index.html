<!DOCTYPE html>
<html lang="id">
<meta name="theme-color" content="#3b82f6">
<head>
<meta charset="UTF-8">
<title>Form Antrian Kunjungan</title>

<style>

h2 {
  margin-top: 0;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #eef3fb, #e4ecf7);
  margin: 0;
}

/* CONTAINER */
.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}


/* CARD */
.card {
  background: white;
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  margin-top: 20px;
  margin: 20px auto;
}

/* HEADER */
.header {
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  color: #1e3a8a;
  margin-bottom: 15px;
}

/* FORM GROUP */

* {
  box-sizing: border-box;
}

.form-group {
  display: flex;
  flex-direction: column;
  margin-bottom: 22px;
}
  .form-group label {
  font-size: 13px;
  color: #374151;
  margin-bottom: 4px;
  }

/* INPUT */
input, select, textarea {
  width: 100%;
  padding: 11px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid #dbeafe;
  font-size: 14px;
  background: #f8fbff;
}

/* FOCUS */
input:focus, select:focus, textarea:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
}

/* SECTION */
.section-title {
  font-size: 14px;
  font-weight: 600;
  margin: 15px 0 10px;
  color: #1e3a8a;
}

/* CHECKBOX */
  .checkbox-wrap {
  display: flex;
  align-items: center; /* ini kunci biar sejajar */
  gap: 10px;
  font-size: 13px;
  margin-top: 12px;
}

.checkbox-wrap input {
  width: 16px;
  height: 16px;
  margin: 0;
}

.checkbox-wrap span {
  flex: 1;
}

/* BUTTON */
button {
  background: linear-gradient(135deg,#3b82f6,#60a5fa);
  color: white;
  padding: 13px;
  border: none;
  border-radius: 12px;
  width: 100%;
  font-size: 15px;
  font-weight: 600;
  margin-top: 15px;
}

/* RESULT */
.result {
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  background: #f1f6ff;
  text-align: center;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 12px;
  color: #6b7280;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <div class="header">📋 Form Kunjungan Lapas</div>

    <!-- FORM -->
    <div class="form-group">
      <label>Nama Lengkap *</label>
      <input id="nama">
    </div>

    <div class="form-group">
      <label>Nomor KTP/NIK *</label>
      <input id="nik">
    </div>

    <div class="form-group">
      <label>Nomor WhatsApp *</label>
      <input id="wa">
    </div>

    <div class="form-group">
      <label>Nama Warga Binaan *</label>
      <input id="warga">
    </div>

    <div class="form-group">
      <label>Alamat *</label>
      <textarea id="alamat"></textarea>
    </div>

    <div class="form-group">
      <label>Tanggal Kunjungan *</label>
      <input type="date" id="tanggal">
    </div>

    <div class="form-group">
      <label>Hubungan *</label>
      <input id="hubungan">
    </div>

    <!-- SECTION BARANG -->
    <div class="section-title">Barang Bawaan</div>

    <div class="form-group">
      <label>Apakah membawa barang?</label>
      <select id="barang">
        <option value="Ya">Ya</option>
        <option value="Tidak" selected>Tidak</option>
      </select>
    </div>

    <div class="form-group">
      <label>Jika ya, sebutkan</label>
      <select id="jenis_barang">
        <option value="">-- Pilih --</option>
        <option>Makanan</option>
        <option>Pakaian</option>
        <option>Lainnya</option>
      </select>
    </div>

    <!-- CHECKBOX -->
    <div class="checkbox-wrap">
      <input type="checkbox" id="setuju">
      <span>Saya bersedia mematuhi seluruh peraturan</span>
    </div>

    <button id="btnKirim">Kirim</button>

    <div class="result" id="hasil"></div>

  </div>
  <!-- FOOTER -->
<div class="footer">
  © 2026 Layanan Terpadu
  <span>Dibuat dengan ❤️ untuk kemudahan pelayanan</span>
</div>

</div>

<script>
const barang = document.getElementById("barang");
const jenis = document.getElementById("jenis_barang");

function toggleBarang() {
  if (barang.value === "Tidak") {
    jenis.disabled = true;
    jenis.value = ""; // reset pilihan
  } else {
    jenis.disabled = false;
  }
}

// event saat berubah
barang.addEventListener("change", toggleBarang);

// jalankan saat pertama load
document.addEventListener("DOMContentLoaded", toggleBarang);
</script>

  <!--button onclick="kirim()">Kirim</button-->
  <!--button id="btnKirim" onclick="kirim()">Kirim</button-->
  <!--button id="btnKirim">Kirim</button-->

</div>
  <script>
document.addEventListener("DOMContentLoaded", function() {

let isSubmitting = false;

// ambil elemen
const nama = document.getElementById("nama");
const nik = document.getElementById("nik");
const wa = document.getElementById("wa");
const warga = document.getElementById("warga");
const alamat = document.getElementById("alamat");
const tanggal = document.getElementById("tanggal");
const hubungan = document.getElementById("hubungan");
const barang = document.getElementById("barang");
const jenis_barang = document.getElementById("jenis_barang");
const setuju = document.getElementById("setuju");
const btnKirim = document.getElementById("btnKirim");
const hasil = document.getElementById("hasil");

// event klik tombol
btnKirim.addEventListener("click", function() {
if (isSubmitting) return;
  // validasi form
  if (
    !nama.value || !nik.value || !wa.value || 
    !warga.value || !alamat.value || !tanggal.value || !hubungan.value
  ) {
    alert("Harap isi semua data wajib!");
    return;
  }

  if (!setuju.checked) {
    alert("Anda harus menyetujui peraturan!");
    return;
  }

  isSubmitting = true;

  btnKirim.disabled = true;
  btnKirim.innerText = "Mengirim...";

  fetch("https://script.google.com/macros/s/AKfycbwWlVGXNImM0C0dFfig_kf-zGPnf2nf6CP9AKZ97SPVJT8UrbXFhTGKuhTePobxmsn0qA/exec", {
    method: "POST",
    body: JSON.stringify({
      nama: nama.value,
      nik: nik.value,
      wa: wa.value,
      warga: warga.value,
      alamat: alamat.value,
      tanggal: tanggal.value,
      hubungan: hubungan.value,
      barang: barang.value,
      jenis_barang: jenis_barang.value
    })
  })
  .then(res => res.json())
  .then(data => {

    // ❌ kuota penuh (termasuk Jumat max 10 dari backend)
    if (data.status === "full") {
      hasil.innerHTML = "❌ Kuota hari ini sudah penuh";
      hasil.style.color = "red";

    } else if (data.status === "ok") {
      hasil.innerHTML =
        "✅ Nomor Antrian Anda: <b>" + data.nomor + "</b><br><br>" +
        "Silakan screenshot sebagai bukti antrian.<br><br>" +
        "<button id='btnBack'>Kembali ke Beranda</button>";

      hasil.style.color = "green";

      document.getElementById("btnBack").onclick = function() {
        window.location.href = "https://sites.google.com/view/layanan-terpadu-lakusim/halaman-muka";
      };

      setTimeout(() => {
        window.location.href = "https://sites.google.com/view/layanan-terpadu-lakusim/halaman-muka";
      }, 5000);
    }
    
    isSubmitting = false;
    btnKirim.disabled = false;
    btnKirim.innerText = "Kirim";

  })
  .catch(() => {
    hasil.innerHTML = "❌ Gagal kirim";
    hasil.style.color = "red";

    isSubmitting = false;
    btnKirim.disabled = false;
    btnKirim.innerText = "Kirim";
  });
});

});
</script> 
 <div class="footer">
  © 2026 Layanan Terpadu <br>
  Dibuat untuk kemudahan pelayanan masyarakat
 </div>
</body>
</html>
