<!DOCTYPE html>
<html lang="id">
<meta name="theme-color" content="#3b82f6">
<head>
<meta charset="UTF-8">
<title>Form Antrian Kunjungan</title>

<style>

h2 {
  margin-top: 0;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #eef3fb, #e4ecf7);
  margin: 0;
}

/* CONTAINER */
.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}


/* CARD */
.card {
  background: white;
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  margin-top: 20px;
  margin: 20px auto;
}

/* HEADER */
.header {
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  color: #1e3a8a;
  margin-bottom: 15px;
}

/* FORM GROUP */

* {
  box-sizing: border-box;
}

.form-group {
  display: flex;
  flex-direction: column;
  margin-bottom: 22px;
}
  .form-group label {
  font-size: 13px;
  color: #374151;
  margin-bottom: 4px;
  }

/* INPUT */
input, select, textarea {
  width: 100%;
  padding: 11px;
  margin-top: 6px;
  border-radius: 10px;
  border: 1px solid #dbeafe;
  font-size: 14px;
  background: #f8fbff;
}

/* FOCUS */
input:focus, select:focus, textarea:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
}

/* SECTION */
.section-title {
  font-size: 14px;
  font-weight: 600;
  margin: 15px 0 10px;
  color: #1e3a8a;
}

/* CHECKBOX */
  .checkbox-wrap {
  display: flex;
  align-items: center; /* ini kunci biar sejajar */
  gap: 10px;
  font-size: 13px;
  margin-top: 12px;
}

.checkbox-wrap input {
  width: 16px;
  height: 16px;
  margin: 0;
}

.checkbox-wrap span {
  flex: 1;
}

/* BUTTON */
button {
  background: linear-gradient(135deg,#3b82f6,#60a5fa);
  color: white;
  padding: 13px;
  border: none;
  border-radius: 12px;
  width: 100%;
  font-size: 15px;
  font-weight: 600;
  margin-top: 15px;
}

/* RESULT */
.result {
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  background: #f1f6ff;
  text-align: center;
}
  @keyframes fadeIn {
  from {opacity:0; transform:translateY(5px);}
  to {opacity:1; transform:translateY(0);}
  }

/* FOOTER */
.footer {
  text-align: center;
  font-size: 12px;
  color: #6b7280;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <div class="header">📋 Form Kunjungan Lapas</div>

    <!-- FORM -->
    <div class="form-group">
      <label>Nama Lengkap *</label>
      <input id="nama">
    </div>

    <div class="form-group">
      <label>Nomor KTP/NIK *</label>
      <input id="nik">
    </div>

    <div class="form-group">
      <label>Nomor WhatsApp *</label>
      <input id="wa">
    </div>

    <div class="form-group">
      <label>Nama Warga Binaan *</label>
      <input id="warga">
    </div>

    <div class="form-group">
      <label>Alamat *</label>
      <textarea id="alamat"></textarea>
    </div>

    <div class="form-group">
      <label>Tanggal Kunjungan *</label>
      <input type="date" id="tanggal">
    </div>

    <div class="form-group">
      <label>Hubungan *</label>
      <input id="hubungan">
    </div>

    <!-- SECTION BARANG -->
    <div class="section-title">Barang Bawaan</div>

    <div class="form-group">
      <label>Apakah membawa barang?</label>
      <select id="barang">
        <option value="Ya">Ya</option>
        <option value="Tidak" selected>Tidak</option>
      </select>
    </div>

    <div class="form-group">
      <label>Jika ya, sebutkan</label>
      <select id="jenis_barang">
        <option value="">-- Pilih --</option>
        <option>Makanan</option>
        <option>Pakaian</option>
        <option>Lainnya</option>
      </select>
    </div>

    <!-- CHECKBOX -->
    <div class="checkbox-wrap">
      <input type="checkbox" id="setuju">
      <span>Saya bersedia mematuhi seluruh peraturan</span>
    </div>

    <button id="btnKirim">Kirim</button>

    <div class="result" id="hasil"></div>

  </div>


</div>

<script>
const barang = document.getElementById("barang");
const jenis = document.getElementById("jenis_barang");

function toggleBarang() {
  if (barang.value === "Tidak") {
    jenis.disabled = true;
    jenis.value = ""; // reset pilihan
  } else {
    jenis.disabled = false;
  }
}

// event saat berubah
barang.addEventListener("change", toggleBarang);

// jalankan saat pertama load
document.addEventListener("DOMContentLoaded", toggleBarang);
</script>

  <!--button onclick="kirim()">Kirim</button-->
  <!--button id="btnKirim" onclick="kirim()">Kirim</button-->
  <!--button id="btnKirim">Kirim</button-->

</div>
  <script>
document.addEventListener("DOMContentLoaded", function() {

let isSubmitting = false;

// ambil elemen
const nama = document.getElementById("nama");
const nik = document.getElementById("nik");
const wa = document.getElementById("wa");
const warga = document.getElementById("warga");
const alamat = document.getElementById("alamat");
const tanggal = document.getElementById("tanggal");
const hubungan = document.getElementById("hubungan");
const barang = document.getElementById("barang");
const jenis_barang = document.getElementById("jenis_barang");
const setuju = document.getElementById("setuju");
const btnKirim = document.getElementById("btnKirim");
const hasil = document.getElementById("hasil");

  function showAlert(pesan, warna = "red") {
  const hasil = document.getElementById("hasil");

  hasil.innerHTML = `
    <div style="
      padding:14px;
      border-radius:12px;
      background:${warna === "red" ? "#fee2e2" : "#dcfce7"};
      color:${warna === "red" ? "#b91c1c" : "#166534"};
      font-weight:500;
      box-shadow:0 6px 15px rgba(0,0,0,0.08);
      animation:fadeIn 0.3s ease;
    ">
      ${pesan}
    </div>
  `;
    }
// event klik tombol
btnKirim.addEventListener("click", function() {
if (isSubmitting) return;
  // validasi form
  // VALIDASI KOSONG
if (
  !nama.value || !nik.value || !wa.value || 
  !warga.value || !alamat.value || !tanggal.value || !hubungan.value
) {
  showAlert("⚠️ Semua data wajib diisi ya!", "red");
  return;
}

// VALIDASI NIK (harus 16 digit angka)
if (!/^\d{16}$/.test(nik.value)) {
  showAlert("❌ NIK harus 16 digit angka!", "red");
  return;
}

// VALIDASI NO HP (maks 14 digit angka)
if (!/^\d{10,14}$/.test(wa.value)) {
  showAlert("❌ Nomor HP harus angka dan maksimal 14 digit!", "red");
  return;
}

// VALIDASI CHECKBOX
if (!setuju.checked) {
  showAlert("⚠️ Anda harus menyetujui peraturan!", "red");
  return;
}

  if (!setuju.checked) {
    alert("Anda harus menyetujui peraturan!");
    return;
  }

  isSubmitting = true;

  btnKirim.disabled = true;
  btnKirim.innerText = "Mengirim...";

  fetch("https://script.google.com/macros/s/AKfycbxnT8D_vqfvUO1v_Scx2q7ziOpKDhv5duP-ejGwfkNZA55hFvqeht_iQbJDHylztcVivA/exec", {
    method: "POST",
    body: JSON.stringify({
      nama: nama.value,
      nik: nik.value,
      wa: wa.value,
      warga: warga.value,
      alamat: alamat.value,
      tanggal: tanggal.value,
      hubungan: hubungan.value,
      barang: barang.value,
      jenis_barang: jenis_barang.value
    })
  })
  .then(res => res.json())
  .then(data => {

    // ❌ kuota penuh (termasuk Jumat max 10 dari backend)
    if (data.status === "full") {
      hasil.innerHTML = "❌ Kuota hari ini sudah penuh";
      hasil.style.color = "red";
  
    } else if (data.status === "duplicate") {
       hasil.innerHTML = `
        ❌ Anda sudah mengambil antrian hari ini <br><br>
        <button onclick="goHome()" style="padding:10px;border:none;border-radius:10px;background:#3b82f6;color:white;width:100%;">
          Kembali ke Home
        </button>
      `;
      hasil.style.color = "red";
    
      resetButton();
  
    } else if (data.status === "ok") {
      //const nomorAntrian = data.nomor;
      const nomorAntrian = data.nomor;

// ✅ TAMBAHKAN DI SINI (DI LUAR HTML STRING)
const qrData = 
  "Nomor: " + nomorAntrian +
  "%0A Nama: " + nama.value +
  "%0A Warga Binaan: " + warga.value +
  "%0A Tanggal: " + tanggal.value;

const qrEncoded = encodeURIComponent(qrData);

hasil.innerHTML =
  "<div style='margin-top:15px;padding:20px;border-radius:18px;background:linear-gradient(135deg,#f8fbff,#eef5ff);box-shadow:0 10px 25px rgba(0,0,0,0.08);text-align:center;'>" +

  "<h3 style='margin:0;color:#1e3a8a;'>🎫 Tiket Kunjungan</h3>" +

  "<div style='border-top:1px dashed #ccc;margin:12px 0;'></div>" +

  "<div style='text-align:left;font-size:14px;margin-top:10px'>" +

"<div style='display:flex;justify-content:space-between;border-bottom:1px dashed #ddd;padding:4px 0'>" +
"<span>Nama</span><span><b>" + nama.value + "</b></span></div>" +

"<div style='display:flex;justify-content:space-between;border-bottom:1px dashed #ddd;padding:4px 0'>" +
"<span>Warga Binaan</span><span><b>" + warga.value + "</b></span></div>" +

"<div style='display:flex;justify-content:space-between;padding:4px 0'>" +
"<span>Tanggal</span><span><b>" + tanggal.value + "</b></span></div>" +

"</div>" +

  "<div style='font-size:38px;font-weight:bold;color:#2563eb;margin:15px 0;'>" +
  nomorAntrian +
  "</div>" +

//"<img src='https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=" + nomorAntrian + "' style='margin-top:10px;'/>" +
//"<img id='qrImg' src='https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=" + nomorAntrian + "' style='margin-top:10px;'/>" +
//"<img id='qrImg' src='https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=" + qrEncoded + "' style='margin-top:10px;'/>" +
  "<img id='qrImg' src='https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=" + qrData + "' style='margin-top:10px;'/>"

  "<div style='border-top:1px dashed #ccc;margin:12px 0;'></div>" +

  "<p style='font-size:12px;color:#6b7280;'>📸 Screenshot sebagai bukti</p>" +

//"<button onclick='window.print()' style='margin-top:8px;padding:10px;border:none;border-radius:10px;background:#10b981;color:white;width:100%;'>🖨 Cetak</button>" +
  "<button id='btnDownloadQR' style='margin-top:8px;padding:10px;border:none;border-radius:10px;background:#10b981;color:white;width:100%;'>⬇️ Download QR</button>" +
  "<button id='btnBack' style='margin-top:10px;padding:10px;border:none;border-radius:10px;background:#3b82f6;color:white;width:100%;'>Kembali ke Home</button>" +

  "</div>";

      document.getElementById("btnBack").onclick = function() {
        // tombol download QR
        document.getElementById("btnDownloadQR").onclick = function() {
         const qrUrl = document.getElementById("qrImg").src;

        fetch(qrUrl)
          .then(res => res.blob())
          .then(blob => {
            const url = window.URL.createObjectURL(blob);

            const a = document.createElement("a");
            a.href = url;
            a.download = "QR_Kunjungan_" + nomorAntrian + ".png";
            document.body.appendChild(a);
            a.click();

            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
          });
        };
        window.location.href = "https://sites.google.com/view/layanan-terpadu-lakusim/home";
      };
      // ⬇️ LETAKKAN DI SINI
setTimeout(() => {
  const btnDownload = document.getElementById("btnDownloadQR");

  if (btnDownload) {
    btnDownload.onclick = function() {
      const qrUrl = document.getElementById("qrImg").src;

      fetch(qrUrl)
        .then(res => res.blob())
        .then(blob => {
          const url = window.URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = url;
          a.download = "QR_Kunjungan_" + nomorAntrian + ".png";
          document.body.appendChild(a);
          a.click();

          document.body.removeChild(a);
          window.URL.revokeObjectURL(url);
        });
    };
  }
}, 200);
    }
    
   // isSubmitting = false;
   // btnKirim.disabled = false;
    //btnKirim.innerText = "Kirim";
    // ❗ PENTING: biarkan tombol tetap mati
    btnKirim.innerText = "✔ Sudah Terdaftar";
    btnKirim.disabled = true;

  })
  .catch(() => {
    hasil.innerHTML = "❌ Gagal kirim";
    hasil.style.color = "red";

    isSubmitting = false;
    btnKirim.disabled = false;
    btnKirim.innerText = "Kirim";
  });
});

});
function goHome() {
  window.location.href = "https://sites.google.com/view/layanan-terpadu-lakusim/home";
}

function resetButton() {
  btnKirim.disabled = false;
  btnKirim.innerText = "Kirim";
  isSubmitting = false;
}
</script> 
 <div class="footer">
  © 2026 Layanan Terpadu
  dibuat dengan ❤️ untuk kemudahan pelayanan
 </div>
</body>
</html>
