<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#3b82f6">
<title>Form Antrian Kunjungan</title>

<style>

h2{
  margin-top:0;
}

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#eef3fb,#e4ecf7);
  margin:0;
}

*{
  box-sizing:border-box;
}

/* CONTAINER */
.container{
  max-width:420px;
  margin:auto;
  padding:15px;
}

/* CARD */
.card{
  background:white;
  border-radius:18px;
  padding:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  margin:20px auto;
}

/* HEADER */
.header{
  text-align:center;
  font-size:18px;
  font-weight:600;
  color:#1e3a8a;
  margin-bottom:15px;
}

/* FORM GROUP */
.form-group{
  display:flex;
  flex-direction:column;
  margin-bottom:22px;
}

.form-group label{
  font-size:13px;
  color:#374151;
  margin-bottom:4px;
}

/* INPUT */
input,
select,
textarea{
  width:100%;
  padding:11px;
  margin-top:6px;
  border-radius:10px;
  border:1px solid #dbeafe;
  font-size:14px;
  background:#f8fbff;
}

/* FOCUS */
input:focus,
select:focus,
textarea:focus{
  outline:none;
  border-color:#3b82f6;
  box-shadow:0 0 0 2px rgba(59,130,246,0.15);
}

/* SECTION */
.section-title{
  font-size:14px;
  font-weight:600;
  margin:15px 0 10px;
  color:#1e3a8a;
}

/* CHECKBOX */
.checkbox-wrap{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:13px;
  margin-top:12px;
}

.checkbox-wrap input{
  width:16px;
  height:16px;
  margin:0;
}

.checkbox-wrap span{
  flex:1;
}

/* BUTTON */
button{
  background:linear-gradient(135deg,#3b82f6,#60a5fa);
  color:white;
  padding:13px;
  border:none;
  border-radius:12px;
  width:100%;
  font-size:15px;
  font-weight:600;
  margin-top:15px;
  cursor:pointer;
}

/* RESULT */
.result{
  margin-top:15px;
  padding:12px;
  border-radius:12px;
  background:#f1f6ff;
  text-align:center;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(5px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* AUTOCOMPLETE */
.autocomplete-wrapper{
  position:relative;
  width:100%;
}

#nama_wbp{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #cfd8dc;
  font-size:16px;
  box-sizing:border-box;
}

.suggestions{
  position:absolute;
  top:100%;
  left:0;
  right:0;
  background:white;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
  max-height:220px;
  overflow-y:auto;
  z-index:9999;
  display:none;
  margin-top:5px;
}

.suggestion-item{
  padding:14px;
  cursor:pointer;
  border-bottom:1px solid #eee;
  font-size:15px;
}

.suggestion-item:hover{
  background:#f5f5f5;
}

.footer{
  text-align:center;
  font-size:12px;
  color:#6b7280;
  margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

  <div class="card">

    <div class="header">
      📋 Form Kunjungan Lapas
    </div>

    <!-- FORM -->
    <div class="form-group">
      <label>Nama Lengkap *</label>
      <input id="nama">
    </div>

    <div class="form-group">
      <label>Nomor KTP/NIK *</label>
      <input id="nik">
    </div>

    <div class="form-group">
      <label>Nomor WhatsApp *</label>
      <input id="wa">
    </div>

    <!-- AUTOCOMPLETE -->
    <div class="form-group">

      <label>Nama Warga Binaan *</label>

      <div class="autocomplete-wrapper">

        <input
          type="text"
          id="nama_wbp"
          autocomplete="off"
          placeholder="Cari nama warga binaan..."
        >

        <div id="suggestions" class="suggestions"></div>

      </div>

    </div>

    <div class="form-group">
      <label>Alamat *</label>
      <textarea id="alamat"></textarea>
    </div>

    <div class="form-group">
      <label>Tanggal Kunjungan *</label>
      <input type="date" id="tanggal">
    </div>

    <div class="form-group">
    <label>Jumlah Orang Yang Akan Berkunjung *</label>
  
    <select id="jumlah_orang">
  
      <option value="">-- Pilih Jumlah --</option>
  
      <option value="1">1 Orang</option>
      <option value="2">2 Orang</option>
      <option value="3">3 Orang</option>
      <option value="4">4 Orang</option>
      <option value="5">5 Orang</option>
  
    </select>
  </div>
    
    <div class="form-group">

      <label>Hubungan *</label>

      <select id="hubungan">

        <option value="">-- Pilih Hubungan --</option>

        <option value="Keluarga Inti">
          Keluarga Inti
        </option>

        <option value="Keluarga Besar">
          Keluarga Besar
        </option>

        <option value="Teman">
          Teman
        </option>

        <option value="Pengacara">
          Pengacara
        </option>

        <option value="Wali">
          Wali
        </option>

        <option value="Lainnya">
          Lainnya
        </option>

      </select>

    </div>

    <!-- BARANG -->
    <div class="section-title">
      Barang Bawaan
    </div>

    <div class="form-group">

      <label>Apakah membawa barang?</label>

      <select id="barang">
        <option value="Ya">Ya</option>
        <option value="Tidak" selected>Tidak</option>
      </select>

    </div>

    <div class="form-group">

      <label>Jika ya, sebutkan</label>

      <select id="jenis_barang">
        <option value="">-- Pilih --</option>
        <option>Makanan</option>
        <option>Pakaian</option>
        <option>Lainnya</option>
      </select>

    </div>

    <!-- CHECKBOX -->
    <div class="checkbox-wrap">
      <input type="checkbox" id="setuju">
      <span>Saya bersedia mematuhi seluruh peraturan</span>
    </div>

    <button id="btnKirim">
      Kirim
    </button>

    <div class="result" id="hasil"></div>

  </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

  let isSubmitting = false;
  let namaValid = false;

  const API_URL =
  "https://script.google.com/macros/s/AKfycbzNQNy1F_nrVW_-6QrGH-i7ZLLz_DnFpDkn7BqJ1u-7Nj-3nPCIQ37yV8ZMmhdkoh7Zyg/exec";

  const nama = document.getElementById("nama");
  const nik = document.getElementById("nik");
  const wa = document.getElementById("wa");

  const warga =
  document.getElementById("nama_wbp");

  const alamat = document.getElementById("alamat");
  const tanggal = document.getElementById("tanggal");
  const jumlah_orang = document.getElementById("jumlah_orang");
  const hubungan = document.getElementById("hubungan");

  const barang = document.getElementById("barang");
  const jenis_barang = document.getElementById("jenis_barang");

  const setuju = document.getElementById("setuju");

  const btnKirim = document.getElementById("btnKirim");

  const hasil = document.getElementById("hasil");

  const suggestions =
  document.getElementById("suggestions");

  // =========================
// AUTOCOMPLETE
// =========================

let debounce;

warga.addEventListener("input", function(){

  clearTimeout(debounce);

  const keyword =
  this.value.trim();

  namaValid = false;
  //if(keyword.length < 1){
  if(keyword.length < 2){
    suggestions.style.display = "none";

    return;
  }

  debounce = setTimeout(() => {

    fetch(
      API_URL +
      "?search=" +
      encodeURIComponent(keyword)
    )

    .then(res => res.json())

    .then(data => {

      suggestions.innerHTML = "";

      
      if(!data || !data.length){

      suggestions.innerHTML = `
    
        <div style="
          padding:14px;
          font-size:14px;
          line-height:1.5;
        ">
    
          ❌ Nama warga binaan tidak ditemukan
    
          <br><br>
    
          Silakan hubungi CP:
          <br>
    
          <a
            href="https://wa.me/6282378414836"
            target="_blank"
            style="
              color:#2563eb;
              font-weight:600;
              text-decoration:none;
            "
          >
            📞 Admin Lapas
          </a>
    
        </div>
    
      `;
    
      suggestions.style.display = "block";
    
      return;
    }

      // TAMPILKAN SEMUA DATA
      data.forEach(item => {

        const div =
        document.createElement("div");

        div.className =
        "suggestion-item";

        div.textContent = item;

        div.onclick = () => {

        warga.value = item;
      
        namaValid = true;
      
        suggestions.style.display = "none";
      };

        suggestions.appendChild(div);

      });

      suggestions.style.display = "block";

    })

    .catch(err => {

      console.log(err);

      suggestions.style.display = "none";

    });

  }, 200);

});

  // TUTUP DROPDOWN
  document.addEventListener("click", function(e){

    if(!e.target.closest(".autocomplete-wrapper")){

      suggestions.style.display = "none";

    }

  });

  // =========================
  // TOGGLE BARANG
  // =========================

  function toggleBarang(){

    if(barang.value === "Tidak"){

      jenis_barang.disabled = true;
      jenis_barang.value = "";

    } else {

      jenis_barang.disabled = false;
    }
  }

  barang.addEventListener("change", toggleBarang);

  toggleBarang();

  // =========================
  // ALERT
  // =========================

  function showAlert(pesan, warna="red"){

    hasil.innerHTML = `
      <div style="
        padding:14px;
        border-radius:12px;
        background:${warna === "red" ? "#fee2e2" : "#dcfce7"};
        color:${warna === "red" ? "#b91c1c" : "#166534"};
        font-weight:500;
        box-shadow:0 6px 15px rgba(0,0,0,0.08);
        animation:fadeIn .3s ease;
      ">
        ${pesan}
      </div>
    `;
  }

  // =========================
  // RESET BUTTON
  // =========================

  function resetButton(){

    isSubmitting = false;

    btnKirim.disabled = false;

    btnKirim.innerText = "Kirim";
  }

  // =========================
  // KIRIM
  // =========================

  btnKirim.addEventListener("click", function(){

    if(isSubmitting) return;

    // VALIDASI KOSONG
    if(
      !nama.value ||
      !nik.value ||
      !wa.value ||
      !warga.value ||
      !alamat.value ||
      !tanggal.value ||
      !jumlah_orang.value ||
      !hubungan.value
    ){
      showAlert("⚠️ Semua data wajib diisi ya!");
      return;
    }

    // VALIDASI NIK
    if(!/^\d{16}$/.test(nik.value)){
      showAlert("❌ NIK harus 16 digit angka!");
      return;
    }

    // VALIDASI HP
    //if(!/^\d{10,13}$/.test(wa.value)){
    if(!/^08\d{8,11}$/.test(wa.value)){
      showAlert("❌ Nomor HP harus angka dan maksimal 13 digit!");
      return;
    }

    // VALIDASI NAMA WBP
    if(!namaValid){
    
      showAlert(
        "❌ Nama warga binaan wajib dipilih dari daftar yang sudah disediakan. Jika tidak tersedia, silakan hubungi Admin Lapas."
      );
    
      return;
    }
    
    // CHECKBOX
    if(!setuju.checked){
      showAlert("⚠️ Anda harus menyetujui peraturan!");
      return;
    }

    // VALIDASI HARI
    const tanggalInput = new Date(tanggal.value);

    const hari = tanggalInput.getDay();

    if(hari === 5 || hari === 6 || hari === 0){

      showAlert("❌ Tidak bisa ambil antrian untuk Jumat/Sabtu/Minggu");

      return;
    }

    // VALIDASI JAM
const now = new Date();

const waktuWIB = new Date(
  now.toLocaleString("en-US", {
    timeZone: "Asia/Jakarta"
  })
);

const hariSekarang = waktuWIB.getDay();

const jam = waktuWIB.getHours();

const menit = waktuWIB.getMinutes();

const totalMenit = jam * 60 + menit;

// Senin-Kamis
if (hariSekarang >= 1 && hariSekarang <= 4) {

  // 09:00 = 540 menit
  // 11:45 = 705
  // 17:00 = 1020 menit
  if (totalMenit < 540 || totalMenit > 705) {

    showAlert("❌ Pengambilan antrian hanya pukul 09:00 - 11:45");

    return;
  }

} else {

  showAlert("❌ Hari ini tidak melayani pengambilan antrian");

  return;
}
    // =========================
    // SUBMIT
    // =========================

    isSubmitting = true;

    btnKirim.disabled = true;

    btnKirim.innerText = "Mengirim...";

    fetch("https://script.google.com/macros/s/AKfycbzNQNy1F_nrVW_-6QrGH-i7ZLLz_DnFpDkn7BqJ1u-7Nj-3nPCIQ37yV8ZMmhdkoh7Zyg/exec", {

      method:"POST",

      body:JSON.stringify({

        nama:nama.value,
        nik:nik.value,
        wa:wa.value,
        warga:warga.value,
        alamat:alamat.value,
        tanggal:tanggal.value,
        jumlah_orang:jumlah_orang.value,
        hubungan:hubungan.value,
        barang:barang.value,
        jenis_barang:jenis_barang.value
      })

    })

    .then(res => res.json())

    .then(data => {

      // FULL
      if(data.status === "full"){

        showAlert("❌ Kuota hari ini sudah penuh");

        resetButton();

        return;
      }

      // DUPLIKAT
      if(data.status === "duplicate"){

        hasil.innerHTML = `
          ❌ Anda sudah mengambil antrian hari ini
          <br><br>

          <button onclick="goHome()"
          style="
            padding:10px;
            border:none;
            border-radius:10px;
            background:#3b82f6;
            color:white;
            width:100%;
          ">
            Kembali ke Home
          </button>
        `;

        resetButton();

        return;
      }

      // TUTUP
      if(data.status === "tutup"){

        showAlert("❌ Pengambilan antrian hanya Senin-Kamis pukul 09:00 - 11:45");

        resetButton();

        return;
      }

      // LIBUR
      if(data.status === "libur"){

        showAlert("❌ Tidak bisa mengambil antrian Jumat/Sabtu/Minggu");

        resetButton();

        return;
      }

      // SUKSES
      if(data.status === "ok"){

        const nomorAntrian = data.nomor;

        const qrData =
          "Nomor: " + nomorAntrian + "\n" +
          "Nama: " + nama.value + "\n" +
          "Warga Binaan: " + warga.value + "\n" +
          "Tanggal: " + tanggal.value;

        const qrEncoded = encodeURIComponent(qrData);

        hasil.innerHTML = `

          <div style="
            margin-top:15px;
            padding:20px;
            border-radius:18px;
            background:linear-gradient(135deg,#f8fbff,#eef5ff);
            box-shadow:0 10px 25px rgba(0,0,0,0.08);
            text-align:center;
          ">

            <h3 style="margin:0;color:#1e3a8a;">
              🎫 Tiket Kunjungan
            </h3>

            <div style="
              border-top:1px dashed #ccc;
              margin:12px 0;
            "></div>

            <div style="
              text-align:left;
              font-size:14px;
            ">

              <div style="
                display:flex;
                justify-content:space-between;
                border-bottom:1px dashed #ddd;
                padding:4px 0;
              ">
                <span>Nama</span>
                <span><b>${nama.value}</b></span>
              </div>

              <div style="
                display:flex;
                justify-content:space-between;
                border-bottom:1px dashed #ddd;
                padding:4px 0;
              ">
                <span>Warga Binaan</span>
                <span><b>${warga.value}</b></span>
              </div>

              <div style="
                display:flex;
                justify-content:space-between;
                padding:4px 0;
              ">
                <span>Tanggal</span>
                <span><b>${tanggal.value}</b></span>
              </div>

            </div>

            <div style="
              font-size:38px;
              font-weight:bold;
              color:#2563eb;
              margin:15px 0;
            ">
              ${nomorAntrian}
            </div>

            <img
              id="qrImg"
              src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${qrEncoded}"
              style="margin-top:10px;"
            >

            <div style="
              border-top:1px dashed #ccc;
              margin:12px 0;
            "></div>

            <p style="
              font-size:12px;
              color:#6b7280;
            ">
              📸 Screenshot sebagai bukti
            </p>

            <button id="btnDownloadQR"
            style="
              margin-top:8px;
              padding:10px;
              border:none;
              border-radius:10px;
              background:#10b981;
              color:white;
              width:100%;
            ">
              ⬇️ Download QR
            </button>

            <button id="btnBack"
            style="
              margin-top:10px;
              padding:10px;
              border:none;
              border-radius:10px;
              background:#3b82f6;
              color:white;
              width:100%;
            ">
              Kembali ke Home
            </button>

          </div>
        `;

        btnKirim.innerText = "✔ Sudah Terdaftar";

        btnKirim.disabled = true;

        // DOWNLOAD QR
        document.getElementById("btnDownloadQR")
        .onclick = function(){

          const qrUrl =
            document.getElementById("qrImg").src;

          fetch(qrUrl)

          .then(res => res.blob())

          .then(blob => {

            const url =
              window.URL.createObjectURL(blob);

            const a =
              document.createElement("a");

            a.href = url;

            a.download =
              "QR_Kunjungan_" +
              nomorAntrian +
              ".png";

            document.body.appendChild(a);

            a.click();

            document.body.removeChild(a);

            window.URL.revokeObjectURL(url);
          });
        };

        // BACK
        document.getElementById("btnBack")
        .onclick = function(){

          window.location.href =
          "https://sites.google.com/view/layanan-terpadu-lakusim/home";
        };
      }

    })

    .catch(() => {

      showAlert("❌ Gagal kirim");

      resetButton();
    });

  });

});

function goHome(){

  window.location.href =
  "https://sites.google.com/view/layanan-terpadu-lakusim/home";
}

</script>

<div class="footer">
  © 2026 Layanan Terpadu
  dibuat dengan ❤️ untuk kemudahan pelayanan
</div>

</body>
  </html>
