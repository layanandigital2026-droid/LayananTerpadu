<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Form Antrian Kunjungan</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f0ebf8;
  margin: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 15px;
}

h2 {
  margin-top: 0;
}

input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-bottom: 1px solid #ccc;
  font-size: 14px;
}

button {
  background: #673ab7;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 5px;
  width: 100%;
  font-size: 16px;
}

button:hover {
  background: #5a2ea6;
}

.result {
  text-align: center;
  font-size: 18px;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>Form Kunjungan Lapas</h2>
  </div>

  <div class="card">
    <label>Nama Lengkap *</label>
    <input id="nama">
  </div>

  <div class="card">
    <label>Nomor KTP/NIK *</label>
    <input id="nik">
  </div>

  <div class="card">
    <label>Nomor WhatsApp *</label>
    <input id="wa">
  </div>

  <div class="card">
    <label>Nama Warga Binaan *</label>
    <input id="warga">
  </div>

  <div class="card">
    <label>Alamat *</label>
    <textarea id="alamat"></textarea>
  </div>

  <div class="card">
    <label>Tanggal Kunjungan *</label>
    <input type="date" id="tanggal">
  </div>

  <div class="card">
    <label>Hubungan dengan Warga Binaan *</label>
    <input id="hubungan">
  </div>

  <div class="card">
    <label>Apakah membawa barang? *</label>
    <select id="barang">
      <option>Ya</option>
      <option>Tidak</option>
    </select>
  </div>

  <div class="card">
    <label>Jika ya, sebutkan</label>
    <select id="jenis_barang">
      <option>Makanan</option>
      <option>Pakaian</option>
      <option>Lainnya</option>
    </select>
  </div>

  <div class="card">
    <label>
      <input type="checkbox" id="setuju">
      Saya bersedia mematuhi seluruh peraturan
    </label>
  </div>

  <button onclick="kirim()">Kirim</button>

  <div class="result" id="hasil"></div>

</div>

<script>
function kirim() {

  // VALIDASI
  if (
    !nama.value || !nik.value || !wa.value || 
    !warga.value || !alamat.value || !tanggal.value || !hubungan.value
  ) {
    alert("Harap isi semua data wajib!");
    return;
  }

  if (!setuju.checked) {
    alert("Anda harus menyetujui peraturan!");
    return;
  }

  fetch("https://script.google.com/d/1xZg8k40Raw65IErSm0-rYs8cSc4gPEKLpCUuQ_WewdlKoGBk3ycxGVPN/edit?usp=sharing", {
    method: "POST",
    body: JSON.stringify({
      nama: nama.value,
      nik: nik.value,
      wa: wa.value,
      warga: warga.value,
      alamat: alamat.value,
      tanggal: tanggal.value,
      hubungan: hubungan.value,
      barang: barang.value,
      jenis_barang: jenis_barang.value
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.status === "full") {
      hasil.innerHTML = "❌ Kuota penuh untuk tanggal ini";
      hasil.style.color = "red";
      return;
    }

    if (data.status === "ok") {
      hasil.innerHTML =
        "✅ Berhasil! Nomor Antrian Anda: <b>" + data.nomor + "</b>";
      hasil.style.color = "green";
    }

  })
  .catch(() => {
    hasil.innerHTML = "❌ Gagal terhubung ke server";
    hasil.style.color = "red";
  });
}
</script>

</body>
</html>
